# Python pre-commit profile — applies to repos with Python code.
# Includes: linting/formatting (ruff), type checking (mypy), dependency auditing (pip-audit).
# Venv dependencies: ruff, mypy, pip-audit.
# Install: pip install ruff mypy pip-audit

repos:
  # Ruff — fast Python linter and formatter.
  # Replaces: flake8, autopep8, isort, black.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5  # Latest stable (check https://github.com/astral-sh/ruff-pre-commit/releases)
    hooks:
      - id: ruff
        name: ruff (linter)
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff (formatter)
        stages: [pre-push]

  # Mypy — static type checking for Python.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1  # Latest stable (check https://github.com/python/mypy/releases)
    hooks:
      - id: mypy
        name: mypy (type checking)
        additional_dependencies: []  # Repo specifies type stubs via setup.cfg or pyproject.toml
        stages: [pre-push]

  # Pip-audit — advisory only (non-blocking).
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (advisory only — will not block commit)
        language: script
        entry: scripts/pip-audit-warn.sh
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-push]
