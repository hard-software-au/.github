name: Branch Name Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"

          # Skip long-lived/protected branches
          if [[ "$BRANCH" == "master" || "$BRANCH" == "main" || "$BRANCH" == "develop" || "$BRANCH" == "staging" ]]; then
            echo "Protected branch — skipping check."
            exit 0
          fi

          # Format: {name}/{intent}/{optional-JIRA-123-}summary
          # With Jira:    rahmat/feat/HS-121-add-planned-outages
          # Without Jira: rahmat/spike/experiment-with-metrics
          VALID_INTENTS="feat|fix|chore|refactor|docs|spike"
          PATTERN="^[a-z][a-z0-9-]*/($VALID_INTENTS)/([A-Z]+-[0-9]+-)?[a-z0-9][a-z0-9-]*$"

          if [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "✓ Branch name follows convention."
          else
            echo "✗ Branch name '$BRANCH' does not follow the convention."
            echo ""
            echo "─────────────────────────────────────────────────"
            echo "Expected format:"
            echo "  With Jira issue:    {name}/{intent}/{JIRA-123}-summary"
            echo "  Without Jira issue: {name}/{intent}/summary"
            echo ""
            echo "Valid intents: feat | fix | chore | refactor | docs | spike"
            echo ""
            echo "Intent meanings:"
            echo "  feat     — new feature"
            echo "  fix      — bug fix"
            echo "  chore    — config updates, dependency bumps, etc."
            echo "  refactor — code refactor, no new feature"
            echo "  docs     — documentation only"
            echo "  spike    — experiment / exploration"
            echo ""
            echo "Examples:"
            echo "  rahmat/feat/HS-121-add-planned-outages"
            echo "  john/fix/HS-42-correct-login-redirect"
            echo "  rahmat/spike/experiment-with-metrics"
            echo "  jane/chore/upgrade-rails-7"
            echo "─────────────────────────────────────────────────"
            exit 1
          fi
