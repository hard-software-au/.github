name: Pre-commit Hooks (Reusable)

# Source of truth: `workflows/reusable-pre-commit.yml`.
# This file exists in `.github/workflows/` because GitHub Actions only executes workflows from this path.
#
# Redeploy process:
# 1) Make changes in the source file above (and in `workflows/pre-commit-template.yml` if needed).
# 2) Commit and merge in the `.github` repo.
# 3) Roll out to target repos with `./rollout-devops-assets.sh --repo <repo> --profiles <profiles>`.
#    (The `.github` repo itself is updated directly via normal PRs.)

on:
  workflow_call:
    inputs:
      profiles:
        description: "Comma-separated list of profiles to run (baseline,python,node,ruby,ansible)"
        required: true
        type: string
      python-version:
        description: "Python version for venv (default: 3.11)"
        required: false
        type: string
        default: "3.11"
      node-version:
        description: "Node.js version for prerequisites (if needed)"
        required: false
        type: string
        default: "20"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: Run Pre-commit Hooks

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better diff detection

      - name: Checkout .github repository (org standards)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/.github
          path: .github-org
          sparse-checkout: |
            pre-commit-profiles
            scripts

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            .github-org/pre-commit-profiles/*.yaml

      - name: Install gitleaks (system prerequisite)
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y gitleaks > /dev/null 2>&1

      - name: Set up Node.js (if needed)
        if: contains(inputs.profiles, 'node')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Generate .pre-commit-config.yaml from profiles
        env:
          PROFILES: ${{ inputs.profiles }}
          GITHUB_ORG_DIR: ".github-org"
        run: |
          CONFIG_FILE=".pre-commit-config.ci.yaml"
          # Parse profile list
          IFS=',' read -ra PROFILE_LIST <<< "$PROFILES"

          # Create output file with header
          cat > "$CONFIG_FILE" << 'EOF'
          # ============================================================================
          # Auto-generated by reusable pre-commit workflow
          # Profiles: ${{ inputs.profiles }}
          # DO NOT EDIT DIRECTLY
          # ============================================================================

          fail_fast: false
          repos:
          EOF

          # Append each profile's repos section
          for profile in "${PROFILE_LIST[@]}"; do
            profile="${profile// /}"  # trim whitespace
            PROFILE_FILE="$GITHUB_ORG_DIR/pre-commit-profiles/${profile}.yaml"
            
            if [[ ! -f "$PROFILE_FILE" ]]; then
              echo "ERROR: profile not found: $PROFILE_FILE"
              echo "Available profiles:"
              ls -1 "$GITHUB_ORG_DIR/pre-commit-profiles/"*.yaml 2>/dev/null | xargs -n1 basename | sed 's/\.yaml$//'
              exit 1
            fi
            
            echo "  # ─── Profile: $profile ───────────────────────────────" >> "$CONFIG_FILE"
            # Extract repos section (skip comments and header)
            awk '/^  - repo:/ { in_repos=1 } in_repos { print }' "$PROFILE_FILE" >> "$CONFIG_FILE"
            echo "" >> "$CONFIG_FILE"
          done

          echo "Generated $CONFIG_FILE:"
          cat "$CONFIG_FILE"

      - name: Normalize generated config for CI
        run: |
          CONFIG_FILE=".pre-commit-config.ci.yaml"
          # Guardrail: enforce CI-safe prettier behavior even if an older profile revision is fetched.
          sed -i.bak 's/entry: prettier --write/entry: prettier --check/g' "$CONFIG_FILE"
          rm -f "$CONFIG_FILE".bak
          echo "Normalized $CONFIG_FILE:"
          cat "$CONFIG_FILE"

      - name: Compute normalized profile key
        id: profile-key
        env:
          PROFILES: ${{ inputs.profiles }}
        run: |
          NORMALIZED_PROFILES="${PROFILES// /}"
          echo "normalized_profiles=$NORMALIZED_PROFILES" >> "$GITHUB_OUTPUT"

      - name: Restore pre-commit hook cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-${{ steps.profile-key.outputs.normalized_profiles }}-${{ hashFiles('.pre-commit-config.ci.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-${{ steps.profile-key.outputs.normalized_profiles }}-
            pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-

      - name: Install pre-commit and profile dependencies
        env:
          PROFILES: ${{ inputs.profiles }}
          GITHUB_ORG_DIR: ".github-org"
        run: |
          set -euo pipefail

          IFS=',' read -ra PROFILE_LIST <<< "$PROFILES"
          PIP_PACKAGES=(pre-commit detect-secrets)
          GEM_PACKAGES=()

          for profile in "${PROFILE_LIST[@]}"; do
            profile="${profile// /}"
            PROFILE_FILE="$GITHUB_ORG_DIR/pre-commit-profiles/${profile}.yaml"

            if [[ ! -f "$PROFILE_FILE" ]]; then
              echo "ERROR: profile not found: $PROFILE_FILE"
              echo "Available profiles:"
              ls -1 "$GITHUB_ORG_DIR/pre-commit-profiles/"*.yaml 2>/dev/null | xargs -n1 basename | sed 's/\.yaml$//'
              exit 1
            fi

            if grep -q '^# Install: pip install' "$PROFILE_FILE"; then
              PACKAGES=$(grep '^# Install: pip install' "$PROFILE_FILE" | sed 's/^# Install: pip install //' | head -1)
              if [[ -n "$PACKAGES" ]]; then
                for package in $PACKAGES; do
                  PIP_PACKAGES+=("$package")
                done
              fi
            fi

            if grep -q '^# Install: gem install' "$PROFILE_FILE"; then
              PACKAGES=$(grep '^# Install: gem install' "$PROFILE_FILE" | sed 's/^# Install: gem install //' | head -1)
              if [[ -n "$PACKAGES" ]]; then
                for package in $PACKAGES; do
                  GEM_PACKAGES+=("$package")
                done
              fi
            fi
          done

          python -m pip install --upgrade pip setuptools wheel --quiet
          python -m pip install --quiet "${PIP_PACKAGES[@]}"

          if (( ${#GEM_PACKAGES[@]} > 0 )); then
            gem install "${GEM_PACKAGES[@]}"
          fi

      - name: Copy helper scripts from org repo
        run: |
          mkdir -p scripts
          cp .github-org/scripts/*.sh scripts/ 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: Create .secrets.baseline if not present
        run: |
          if [[ ! -f .secrets.baseline ]]; then
            echo "Creating initial .secrets.baseline..."
            detect-secrets scan > .secrets.baseline 2>/dev/null || true
          fi

      - name: Run pre-commit checks (changed files only)
        run: |
          set -o pipefail
          ZERO_SHA="0000000000000000000000000000000000000000"

          ensure_commit_exists() {
            local ref="$1"
            [[ -z "$ref" ]] && return 1
            git cat-file -e "${ref}^{commit}" 2>/dev/null && return 0
            # If the commit object is missing locally, try a shallow fetch.
            git fetch --no-tags --depth=1 origin "$ref" >/dev/null 2>&1 || return 1
            git cat-file -e "${ref}^{commit}" 2>/dev/null
          }

          # Prefer event payload SHAs for PRs; these are stable and do not depend on remote-tracking refs.
          if [[ -n "${{ github.event.pull_request.base.sha }}" && -n "${{ github.event.pull_request.head.sha }}" ]]; then
            FROM_REF="${{ github.event.pull_request.base.sha }}"
            TO_REF="${{ github.event.pull_request.head.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "$ZERO_SHA" ]]; then
            # push event — diff against previous pushed commit
            FROM_REF="${{ github.event.before }}"
            TO_REF="${{ github.sha }}"
          else
            # Initial push (or missing before SHA): run full check to avoid invalid ref failures.
            echo "No valid base ref found (initial push or missing event.before); running --all-files"
            pre-commit run --config .pre-commit-config.ci.yaml --all-files \
              --verbose \
              --color=always \
              2>&1 | tee pre-commit.log
            exit ${PIPESTATUS[0]}
          fi

          if ! ensure_commit_exists "$FROM_REF" || ! ensure_commit_exists "$TO_REF"; then
            echo "Unable to resolve one or both refs ($FROM_REF -> $TO_REF); running --all-files"
            pre-commit run --config .pre-commit-config.ci.yaml --all-files \
              --verbose \
              --color=always \
              2>&1 | tee pre-commit.log
            exit ${PIPESTATUS[0]}
          fi

          pre-commit run \
            --config .pre-commit-config.ci.yaml \
            --from-ref "$FROM_REF" \
            --to-ref "$TO_REF" \
            --verbose \
            --color=always \
            2>&1 | tee pre-commit.log
          exit ${PIPESTATUS[0]}

      - name: Upload pre-commit log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit-log-${{ github.run_id }}
          path: pre-commit.log
          retention-days: 5
