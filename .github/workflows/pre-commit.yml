name: Pre-commit Hooks

# Source of truth: `workflows/pre-commit-template.yml`.
# This file exists in `.github/workflows/` because GitHub Actions only executes workflows from this path(.github/.github/workflows/).
#
# Redeploy process:
# 1) Make changes in the source file above (and in `workflows/reusable-pre-commit.yml` if needed).
# 2) Commit and merge in the `.github` repo.
# 3) Roll out to target repos with `./rollout-devops-assets.sh --repo <repo> --profiles <profiles>`.
#    (The `.github` repo itself is updated directly via normal PRs.)

# NOTE:
# - This template requires `.github/workflows/reusable-pre-commit.yml` in the target repo.
# - Replace `profiles` with the exact profile set for this repository before merging.

on:
  push:

jobs:
  pre-commit:
    name: Pre-commit Checks
    # Replace the profile list below with profiles appropriate for your repo
    # Examples:
    #   Python project:     profiles: baseline,python
    #   Node.js project:    profiles: baseline,node
    #   Rails project:      profiles: baseline,python,ruby
    #   Ansible/IaC:        profiles: baseline,ansible
    uses: ./.github/workflows/reusable-pre-commit.yml
    with:
      profiles: baseline # TODO: replace with repo-specific list (e.g. baseline,python)
      python-version: "3.11"
