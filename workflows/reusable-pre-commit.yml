name: Pre-commit Hooks (Reusable)

on:
  workflow_call:
    inputs:
      profiles:
        description: "Comma-separated list of profiles to run (baseline,python,node,ruby,ansible)"
        required: true
        type: string
      python-version:
        description: "Python version for venv (default: 3.11)"
        required: false
        type: string
        default: "3.11"
      node-version:
        description: "Node.js version for prerequisites (if needed)"
        required: false
        type: string
        default: "20"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: Run Pre-commit Hooks

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better diff detection

      - name: Checkout .github repository (org standards)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/.github
          path: .github-org
          sparse-checkout: |
            pre-commit-profiles
            scripts

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install gitleaks (system prerequisite)
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y gitleaks > /dev/null 2>&1

      - name: Set up Node.js (if needed)
        if: contains(inputs.profiles, 'node')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Generate .pre-commit-config.yaml from profiles
        env:
          PROFILES: ${{ inputs.profiles }}
          GITHUB_ORG_DIR: ".github-org"
        run: |
          # Parse profile list
          IFS=',' read -ra PROFILE_LIST <<< "$PROFILES"

          # Create output file with header
          cat > .pre-commit-config.yaml << 'EOF'
          # ============================================================================
          # Auto-generated by reusable pre-commit workflow
          # Profiles: ${{ inputs.profiles }}
          # DO NOT EDIT DIRECTLY
          # ============================================================================

          fail_fast: false
          repos:
          EOF

          # Append each profile's repos section
          for profile in "${PROFILE_LIST[@]}"; do
            profile="${profile// /}"  # trim whitespace
            PROFILE_FILE="$GITHUB_ORG_DIR/pre-commit-profiles/${profile}.yaml"
            
            if [[ ! -f "$PROFILE_FILE" ]]; then
              echo "ERROR: profile not found: $PROFILE_FILE"
              echo "Available profiles:"
              ls -1 "$GITHUB_ORG_DIR/pre-commit-profiles/"*.yaml 2>/dev/null | xargs -n1 basename | sed 's/\.yaml$//'
              exit 1
            fi
            
            echo "  # ─── Profile: $profile ───────────────────────────────" >> .pre-commit-config.yaml
            # Extract repos section (skip comments and header)
            awk '/^  - repo:/ { in_repos=1 } in_repos { print }' "$PROFILE_FILE" >> .pre-commit-config.yaml
            echo "" >> .pre-commit-config.yaml
          done

          echo "Generated .pre-commit-config.yaml:"
          cat .pre-commit-config.yaml

      - name: Normalize generated config for CI
        run: |
          # Guardrail: enforce CI-safe settings even if an older profile revision is fetched.
          sed -i.bak 's/entry: prettier --write/entry: prettier --check/g' .pre-commit-config.yaml
          sed -i.bak '/id: detect-secrets/{n;s/language: script/language: system/;}' .pre-commit-config.yaml
          rm -f .pre-commit-config.yaml.bak
          echo "Normalized .pre-commit-config.yaml:"
          cat .pre-commit-config.yaml

      - name: Install pre-commit and profile dependencies
        env:
          PROFILES: ${{ inputs.profiles }}
          GITHUB_ORG_DIR: ".github-org"
        run: |
          set -euo pipefail

          IFS=',' read -ra PROFILE_LIST <<< "$PROFILES"
          PIP_PACKAGES=(pre-commit detect-secrets)
          GEM_PACKAGES=()

          for profile in "${PROFILE_LIST[@]}"; do
            profile="${profile// /}"
            PROFILE_FILE="$GITHUB_ORG_DIR/pre-commit-profiles/${profile}.yaml"

            if [[ ! -f "$PROFILE_FILE" ]]; then
              echo "ERROR: profile not found: $PROFILE_FILE"
              echo "Available profiles:"
              ls -1 "$GITHUB_ORG_DIR/pre-commit-profiles/"*.yaml 2>/dev/null | xargs -n1 basename | sed 's/\.yaml$//'
              exit 1
            fi

            if grep -q '^# Install: pip install' "$PROFILE_FILE"; then
              PACKAGES=$(grep '^# Install: pip install' "$PROFILE_FILE" | sed 's/^# Install: pip install //' | head -1)
              if [[ -n "$PACKAGES" ]]; then
                for package in $PACKAGES; do
                  PIP_PACKAGES+=("$package")
                done
              fi
            fi

            if grep -q '^# Install: gem install' "$PROFILE_FILE"; then
              PACKAGES=$(grep '^# Install: gem install' "$PROFILE_FILE" | sed 's/^# Install: gem install //' | head -1)
              if [[ -n "$PACKAGES" ]]; then
                for package in $PACKAGES; do
                  GEM_PACKAGES+=("$package")
                done
              fi
            fi
          done

          python -m pip install --upgrade pip setuptools wheel --quiet
          python -m pip install --quiet "${PIP_PACKAGES[@]}"

          if (( ${#GEM_PACKAGES[@]} > 0 )); then
            gem install "${GEM_PACKAGES[@]}"
          fi

      - name: Copy helper scripts from org repo
        run: |
          mkdir -p scripts
          cp .github-org/scripts/*.sh scripts/ 2>/dev/null || true
          chmod +x scripts/*.sh

      - name: Create .secrets.baseline if not present
        run: |
          if [[ ! -f .secrets.baseline ]]; then
            echo "Creating initial .secrets.baseline..."
            detect-secrets scan > .secrets.baseline 2>/dev/null || true
          fi

      - name: Run pre-commit checks (changed files only)
        run: |
          set -o pipefail
          # On pull_request: check only the files changed in this PR.
          # On push to main/master: check files changed in the pushed commit(s).
          # This avoids failing on pre-existing unlinted code in the repo.
          if [[ -n "${{ github.base_ref }}" ]]; then
            FROM_REF="origin/${{ github.base_ref }}"
            TO_REF="${{ github.sha }}"
          else
            # push event — diff against the previous commit
            FROM_REF="${{ github.event.before }}"
            TO_REF="${{ github.sha }}"
          fi

          pre-commit run \
            --from-ref "$FROM_REF" \
            --to-ref "$TO_REF" \
            --verbose \
            --color=always \
            2>&1 | tee pre-commit.log

      - name: Upload pre-commit log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit-log-${{ github.run_id }}
          path: pre-commit.log
          retention-days: 5
